name: Bootstrap EKS Access Governance

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}
  TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}
  TF_LOCK_TABLE: ${{ vars.TF_LOCK_TABLE }}
  TF_STATE_KEY_PREFIX: ${{ vars.TF_STATE_KEY_PREFIX }}
  TF_IN_AUTOMATION: "1"
  AWS_PAGER: ""
  DISABLE_AUTO_UPDATE: "true"

jobs:
  bootstrap-access:
    name: Bootstrap EKS access governance
    runs-on: ubuntu-latest
    environment: prod
    concurrency:
      group: bootstrap-access
      cancel-in-progress: false
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required CI vars/secrets
        shell: bash
        env:
          BOOTSTRAP_ROLE_ARN: ${{ secrets.BOOTSTRAP_ROLE_ARN }}
        run: |
          missing=0
          required=(AWS_REGION TF_STATE_BUCKET TF_LOCK_TABLE TF_STATE_KEY_PREFIX BOOTSTRAP_ROLE_ARN)
          for var in "${required[@]}"; do
            if [[ -z "${!var}" ]]; then
              echo "::error title=Missing required CI configuration::${var} is not set"
              missing=1
            fi
          done
          if [[ "$missing" -ne 0 ]]; then
            echo "Access bootstrap workflow configuration validation failed. Configure required vars/secrets in GitHub Actions settings."
            exit 1
          fi

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.BOOTSTRAP_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Render CI local config overrides
        shell: bash
        run: |
          cat > config/local.env <<EOF
          AWS_ACCOUNT_ID=${AWS_ACCOUNT_ID}
          TF_STATE_BUCKET=${TF_STATE_BUCKET}
          TF_LOCK_TABLE=${TF_LOCK_TABLE}
          TF_STATE_KEY_PREFIX=${TF_STATE_KEY_PREFIX}
          EOF

      - name: Render backend config
        run: make render-config

      - name: Terraform init (access)
        run: terraform -chdir=platform/terraform/access init -input=false -backend-config=backend.hcl -no-color

      - name: Terraform apply (access)
        env:
          BOOTSTRAP_ROLE_ARN: ${{ secrets.BOOTSTRAP_ROLE_ARN }}
        run: terraform -chdir=platform/terraform/access apply -auto-approve -input=false -no-color -var="region=${AWS_REGION}" -var="bootstrap_role_arn=${BOOTSTRAP_ROLE_ARN}"

      - name: Write workflow summary
        shell: bash
        run: |
          {
            echo "## Access bootstrap complete"
            echo "- Scope: EKS access governance"
            echo "- Workflow: successful"
          } >> "$GITHUB_STEP_SUMMARY"
