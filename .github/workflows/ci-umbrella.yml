name: CI Umbrella

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

# Default: read-only. Jobs that need extra permissions declare them explicitly.
permissions:
  contents: read

# CI configuration contract (GitHub Actions)
#
# Repository/Environment Variables (vars):
#   AWS_REGION
#   AWS_ACCOUNT_ID
#   TF_STATE_BUCKET
#   TF_LOCK_TABLE
#   TF_STATE_KEY_PREFIX
#
# Repository/Environment Secrets:
#   TF_PLAN_ROLE_ARN
#   ECR_PUSH_ROLE_ARN
#
# This workflow is designed to rely only on GitHub vars/secrets in CI.
env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}
  TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}
  TF_LOCK_TABLE: ${{ vars.TF_LOCK_TABLE }}
  TF_STATE_KEY_PREFIX: ${{ vars.TF_STATE_KEY_PREFIX }}

jobs:
  # ── Static analysis (run on every event) ────────────────────────────────────

  language-check:
    name: Enforce English Repository Content
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Run language check
        run: bash ci/check-english.sh

  terraform-check:
    name: Terraform Format and Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
      - name: Terraform fmt check
        run: terraform fmt -check -recursive platform/terraform
      - name: Validate bootstrap
        run: |
          terraform -chdir=platform/terraform/bootstrap init -backend=false
          terraform -chdir=platform/terraform/bootstrap validate
      - name: Validate dev environment
        run: |
          terraform -chdir=platform/terraform/envs/dev init -backend=false
          terraform -chdir=platform/terraform/envs/dev validate
      - name: Validate stg environment
        run: |
          terraform -chdir=platform/terraform/envs/stg init -backend=false
          terraform -chdir=platform/terraform/envs/stg validate
      - name: Validate prod environment
        run: |
          terraform -chdir=platform/terraform/envs/prod init -backend=false
          terraform -chdir=platform/terraform/envs/prod validate

  helm-lint:
    name: Helm Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Helm
        uses: azure/setup-helm@v4
      - name: Lint chart
        run: helm lint platform/gitops/helm/charts/openshelter-stack

  ansible-syntax:
    name: Ansible Syntax Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Ansible
        run: pip install ansible
      - name: Syntax check playbook
        working-directory: ops/ansible
        run: ansible-playbook --syntax-check playbooks/zabbix-config.yml

  # ── Terraform plan — PRs only ────────────────────────────────────────────────
  #
  # Requires a GitHub OIDC trust on the AWS side:
  #   Secret: TF_PLAN_ROLE_ARN  →  IAM role arn allowed to run terraform plan
  #
  terraform-plan:
    name: Terraform Plan (dev)
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == false
    runs-on: ubuntu-latest
    environment: dev
    needs: [terraform-check]
    permissions:
      id-token: write       # required for OIDC token exchange
      contents: read
      pull-requests: write  # required to post the plan as a PR comment
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required CI vars/secrets
        shell: bash
        env:
          AWS_REGION: ${{ vars.AWS_REGION }}
          TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}
          TF_LOCK_TABLE: ${{ vars.TF_LOCK_TABLE }}
          TF_STATE_KEY_PREFIX: ${{ vars.TF_STATE_KEY_PREFIX }}
          TF_PLAN_ROLE_ARN: ${{ secrets.TF_PLAN_ROLE_ARN }}
        run: |
          missing=0
          required=(AWS_REGION TF_STATE_BUCKET TF_LOCK_TABLE TF_STATE_KEY_PREFIX TF_PLAN_ROLE_ARN)
          for var in "${required[@]}"; do
            if [[ -z "${!var}" ]]; then
              echo "::error title=Missing required CI configuration::${var} is not set"
              missing=1
            fi
          done
          if [[ "$missing" -ne 0 ]]; then
            echo "CI configuration validation failed. Configure required vars/secrets in GitHub Actions settings."
            exit 1
          fi

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.TF_PLAN_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Render backend config (CI vars)
        shell: bash
        run: |
          cat > platform/terraform/envs/dev/backend.hcl <<EOF
          bucket         = "${TF_STATE_BUCKET}"
          key            = "${TF_STATE_KEY_PREFIX}/dev/terraform.tfstate"
          region         = "${AWS_REGION}"
          dynamodb_table = "${TF_LOCK_TABLE}"
          encrypt        = true
          EOF

      - name: Terraform init (dev)
        run: terraform -chdir=platform/terraform/envs/dev init -input=false -backend-config=backend.hcl

      - name: Terraform plan (dev)
        id: plan
        run: |
          terraform -chdir=platform/terraform/envs/dev plan \
            -input=false \
            -lock=false \
            -no-color \
            -var="region=${AWS_REGION}" \
            -var="environment=dev" \
            -var="vpc_cidr=10.255.250.0/24" \
            2>&1 | tee /tmp/plan.txt
          echo "exitcode=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"
        continue-on-error: true

      - name: Post plan as PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('/tmp/plan.txt', 'utf8').slice(0, 65000);
            const body = `### Terraform Plan — \`envs/dev\`\n\`\`\`hcl\n${plan}\n\`\`\``;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.startsWith('### Terraform Plan'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Fail if plan errored
        if: steps.plan.outcome == 'failure'
        run: exit 1

  # ── Docker build + ECR push — main branch only ──────────────────────────────
  #
  # Requires:
  #   Secret: ECR_PUSH_ROLE_ARN  →  IAM role with ecr:GetAuthorizationToken +
  #                                  ecr:BatchCheckLayerAvailability +
  #                                  ecr:PutImage etc.
  #   Vars: AWS_ACCOUNT_ID + AWS_REGION
  #                                  used to derive ECR registry
  #                                  e.g. 123456789012.dkr.ecr.eu-central-1.amazonaws.com
  #
  docker-build-push:
    name: Docker Build and Push to ECR
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: prod
    concurrency:
      group: docker-build-push-main
      cancel-in-progress: false
    needs: [language-check, terraform-check, helm-lint, ansible-syntax]
    permissions:
      id-token: write
      contents: write   # required to push the image-tag update commit
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Fetch full history so we can push a commit back
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate required CI vars/secrets
        shell: bash
        env:
          AWS_REGION: ${{ vars.AWS_REGION }}
          AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}
          ECR_PUSH_ROLE_ARN: ${{ secrets.ECR_PUSH_ROLE_ARN }}
        run: |
          missing=0
          required=(AWS_REGION AWS_ACCOUNT_ID ECR_PUSH_ROLE_ARN)
          for var in "${required[@]}"; do
            if [[ -z "${!var}" ]]; then
              echo "::error title=Missing required CI configuration::${var} is not set"
              missing=1
            fi
          done
          if [[ "$missing" -ne 0 ]]; then
            echo "CI configuration validation failed. Configure required vars/secrets in GitHub Actions settings."
            exit 1
          fi

      - name: Resolve image tag (short SHA)
        id: meta
        run: echo "tag=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Derive ECR registry from vars
        shell: bash
        run: |
          echo "ECR_REGISTRY=${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com" >> "$GITHUB_ENV"

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.ECR_PUSH_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push — zabbix
        uses: docker/build-push-action@v5
        with:
          context: apps/zabbix
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/openshelter/zabbix:${{ steps.meta.outputs.tag }}
            ${{ env.ECR_REGISTRY }}/openshelter/zabbix:latest

      - name: Build and push — mqtt
        uses: docker/build-push-action@v5
        with:
          context: apps/mqtt
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/openshelter/mqtt:${{ steps.meta.outputs.tag }}
            ${{ env.ECR_REGISTRY }}/openshelter/mqtt:latest

      # Update image tags in all environment values files and commit back
      - name: Install yq
        run: |
          wget -qO /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          chmod +x /usr/local/bin/yq

      - name: Update image tags in Helm values
        env:
          TAG: ${{ steps.meta.outputs.tag }}
          REGISTRY: ${{ env.ECR_REGISTRY }}
        run: |
          for env in dev stg prod; do
            VALUES="platform/gitops/helm/values/${env}/openshelter-stack.yaml"
            yq -i ".zabbix.image.repository = \"${REGISTRY}/openshelter/zabbix\"" "$VALUES"
            yq -i ".zabbix.image.tag        = \"${TAG}\""                          "$VALUES"
            yq -i ".mqtt.image.repository   = \"${REGISTRY}/openshelter/mqtt\""   "$VALUES"
            yq -i ".mqtt.image.tag          = \"${TAG}\""                          "$VALUES"
          done

      - name: Commit and push updated image tags
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add platform/gitops/helm/values/*/openshelter-stack.yaml
          git diff --cached --quiet || \
            git commit -m "chore(ci): bump image tags to ${GITHUB_SHA::7} [skip ci]"
          git push
