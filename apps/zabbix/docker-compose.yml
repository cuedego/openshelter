services:
  postgres:
    image: postgres:16-alpine
    container_name: openshelter-zabbix-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-openshelter}
      POSTGRES_USER: ${POSTGRES_USER:-openshelter_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-openshelter-dev-password}
    volumes:
      - zabbix_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-openshelter_admin} -d ${POSTGRES_DB:-openshelter}"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  zabbix-server:
    build:
      context: .
    image: openshelter/zabbix-server:local
    container_name: openshelter-zabbix-server
    environment:
      DB_SERVER_HOST: postgres
      DB_SERVER_PORT: "5432"
      POSTGRES_DB: ${POSTGRES_DB:-openshelter}
      POSTGRES_USER: ${POSTGRES_USER:-openshelter_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-openshelter-dev-password}
    ports:
      - "10051:10051"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  zabbix-web:
    image: zabbix/zabbix-web-nginx-pgsql:alpine-7.0-latest
    container_name: openshelter-zabbix-web
    environment:
      DB_SERVER_HOST: postgres
      POSTGRES_DB: ${POSTGRES_DB:-openshelter}
      POSTGRES_USER: ${POSTGRES_USER:-openshelter_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-openshelter-dev-password}
      ZBX_SERVER_HOST: zabbix-server
      PHP_TZ: ${PHP_TZ:-UTC}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      zabbix-server:
        condition: service_started
    restart: unless-stopped

volumes:
  zabbix_postgres_data:
