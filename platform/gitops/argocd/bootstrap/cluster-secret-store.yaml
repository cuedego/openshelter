apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: aws-secrets-manager
spec:
  provider:
    aws:
      service: SecretsManager
      region: REPLACE_AWS_REGION   # replaced at bootstrap time by argocd-bootstrap.sh
      auth:
        jwt:
          serviceAccountRef:
            # The External Secrets Operator controller service account.
            # Its IRSA annotation is set during ESO Helm install (ESO_IRSA_ROLE_ARN).
            name: external-secrets
            namespace: external-secrets
