global:
  environment: prod

zabbix:
  enabled: true
  replicaCount: 2
  image:
    repository: "REPLACE_ME.dkr.ecr.REPLACE_AWS_REGION.amazonaws.com/openshelter/zabbix"
    tag: "0.1.0"
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 1000m
      memory: 2Gi
  db:
    host: "REPLACE_ME.rds.amazonaws.com"
  ingress:
    enabled: true
    annotations:
      alb.ingress.kubernetes.io/scheme: internal
      alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS": 443}]'
      alb.ingress.kubernetes.io/certificate-arn: "REPLACE_ACM_CERTIFICATE_ARN"
  secrets:
    rdsPassword:
      remoteRef: "openshelter-prod/rds/password"
    adminPassword:
      remoteRef: "openshelter-prod/zabbix/admin-password"

mqtt:
  enabled: true
  replicaCount: 2
  image:
    repository: "REPLACE_ME.dkr.ecr.REPLACE_AWS_REGION.amazonaws.com/openshelter/mqtt"
    tag: "0.1.0"
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  secrets:
    password:
      remoteRef: "openshelter-prod/mqtt/password"
