{{- if .Values.mqtt.enabled }}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ .Release.Name }}-mqtt
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "openshelter.labels" . | nindent 4 }}
    {{- include "openshelter.mqtt.selectorLabels" . | nindent 4 }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: {{ .Values.mqtt.secretStore }}
    kind: ClusterSecretStore
  target:
    name: {{ .Release.Name }}-mqtt
    creationPolicy: Owner
  data:
    - secretKey: password
      remoteRef:
        key: {{ .Values.mqtt.secrets.password.remoteRef }}
{{- end }}
