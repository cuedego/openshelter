{{- if .Values.mqtt.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-mqtt
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "openshelter.labels" . | nindent 4 }}
    {{- include "openshelter.mqtt.selectorLabels" . | nindent 4 }}
spec:
  type: {{ .Values.mqtt.service.type }}
  ports:
    - port: {{ .Values.mqtt.service.mqttPort }}
      targetPort: mqtt
      protocol: TCP
      name: mqtt
    - port: {{ .Values.mqtt.service.wsPort }}
      targetPort: ws
      protocol: TCP
      name: ws
  selector:
    {{- include "openshelter.mqtt.selectorLabels" . | nindent 4 }}
{{- end }}
