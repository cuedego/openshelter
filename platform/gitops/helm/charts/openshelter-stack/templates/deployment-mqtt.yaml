{{- if .Values.mqtt.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-mqtt
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "openshelter.labels" . | nindent 4 }}
    {{- include "openshelter.mqtt.selectorLabels" . | nindent 4 }}
spec:
  replicas: {{ .Values.mqtt.replicaCount }}
  selector:
    matchLabels:
      {{- include "openshelter.mqtt.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "openshelter.labels" . | nindent 8 }}
        {{- include "openshelter.mqtt.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ .Release.Name }}-mqtt
      containers:
        - name: mqtt
          image: "{{ .Values.mqtt.image.repository }}:{{ .Values.mqtt.image.tag }}"
          imagePullPolicy: {{ .Values.mqtt.image.pullPolicy }}
          command:
            - /bin/sh
            - -ec
          args:
            - |
              mosquitto_passwd -b -c /mosquitto/config/passwords.txt "$MQTT_USERNAME" "$MQTT_PASSWORD"
              exec mosquitto -c /mosquitto/config/mosquitto.conf
          ports:
            - name: mqtt
              containerPort: 1883
              protocol: TCP
            - name: ws
              containerPort: 9001
              protocol: TCP
          env:
            - name: MQTT_USERNAME
              value: {{ .Values.mqtt.username | quote }}
            - name: MQTT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-mqtt
                  key: password
          livenessProbe:
            tcpSocket:
              port: mqtt
            initialDelaySeconds: 10
            periodSeconds: 20
          readinessProbe:
            tcpSocket:
              port: mqtt
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.mqtt.resources | nindent 12 }}
{{- end }}
